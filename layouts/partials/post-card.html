<article class="post-card">
  {{ with .Params.image }}
  <a href="{{ $.Permalink }}">
    <img class="post-card-img" src="{{ . }}" alt="{{ $.Title }}">
  </a>
  {{ end }}
  <div class="post-card-body">
    <div class="post-card-date">{{ .Date.Format "January 2, 2006" }}</div>
    <h3 class="post-card-title"><a href="{{ .Permalink }}">{{ .Title }}</a></h3>
    <p class="post-card-summary">{{ .Summary }}</p>
  </div>
</article>
